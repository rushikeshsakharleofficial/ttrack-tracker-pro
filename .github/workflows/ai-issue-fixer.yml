name: AI Issue Fixer

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_PAT }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Comment on issue — starting
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "🤖 **AI Issue Fixer** is analyzing this issue and attempting a fix using \`qwen/qwen3-coder-480b-a35b-instruct\` via NVIDIA NIM. A PR will be opened if a safe fix is found."

      - name: Run AI fixer
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python3 .github/scripts/fix-issue.py

      - name: Comment on issue — done
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            gh issue comment ${{ github.event.issue.number }} \
              --body "✅ **AI Issue Fixer** completed — check the PR linked above."
          else
            gh issue comment ${{ github.event.issue.number }} \
              --body "⚠️ **AI Issue Fixer** could not produce a safe fix for this issue. Manual review needed."
          fi
