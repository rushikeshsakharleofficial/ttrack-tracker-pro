name: AI Issue Reporter

on:
  push:
    branches: [main]

permissions:
  issues: write
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Collect diff and metadata
        run: |
          git diff HEAD~1 HEAD -- '*.rs' '*.toml' '*.sh' '*.yml' \
            | head -c 12000 > /tmp/diff.txt
          git log -1 --pretty=%B > /tmp/commit.txt
          git rev-parse --short HEAD > /tmp/sha.txt
          echo "Diff size: $(wc -c < /tmp/diff.txt) bytes"

      - name: Analyze with NVIDIA NIM
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, urllib.error, sys

          api_key = os.environ["NVIDIA_API_KEY"]
          diff    = open("/tmp/diff.txt").read()
          commit  = open("/tmp/commit.txt").read().strip()
          sha     = open("/tmp/sha.txt").read().strip()

          prompt = f"""You are a senior Rust code reviewer. Analyze this git diff and commit message.
Find real bugs, security issues, and correctness problems only. Skip style nits.

Commit: {commit}
SHA: {sha}

Diff:
{diff}

Respond with ONLY a raw JSON array — no markdown, no explanation, no code fences.
Each element has these exact keys:
  "title"    : short issue title under 70 chars
  "body"     : detailed description with file:line if known, impact, and fix
  "labels"   : array containing one of ["bug"], ["security"], or ["enhancement"]
  "severity" : one of "critical", "high", "medium"

Return [] if no issues of medium severity or higher are found."""

          payload = json.dumps({
              "model": "nvidia/llama-3.1-nemotron-ultra-253b-v1",
              "messages": [{"role": "user", "content": prompt}],
              "temperature": 0.1,
              "max_tokens": 2048,
              "top_p": 0.7,
          }).encode()

          req = urllib.request.Request(
              "https://integrate.api.nvidia.com/v1/chat/completions",
              data=payload,
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json",
              },
          )

          try:
              with urllib.request.urlopen(req, timeout=60) as resp:
                  data = json.loads(resp.read())
              content = data["choices"][0]["message"]["content"].strip()
          except Exception as e:
              print(f"API error: {e}", file=sys.stderr)
              content = "[]"

          # Strip markdown fences if model wrapped the JSON
          if content.startswith("```"):
              lines = content.splitlines()
              content = "\n".join(
                  l for l in lines if not l.startswith("```")
              ).strip()

          try:
              issues = json.loads(content)
              if not isinstance(issues, list):
                  issues = []
          except Exception:
              issues = []

          with open("/tmp/issues.json", "w") as f:
              json.dump(issues, f)

          print(f"Found {len(issues)} issue(s)")
          PYEOF

      - name: Create GitHub issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, sys, time

          sha    = open("/tmp/sha.txt").read().strip()
          issues = json.load(open("/tmp/issues.json"))

          if not issues:
              print("No issues — push looks clean.")
              sys.exit(0)

          for issue in issues:
              title    = issue.get("title", "Untitled")
              body     = issue.get("body", "")
              severity = issue.get("severity", "medium")
              labels   = issue.get("labels", ["bug"])

              full_title = f"[{severity}] {title}"
              full_body  = f"**Found in commit:** {sha}\n\n{body}\n\n---\n*Auto-generated by AI Issue Reporter*"

              label_args = []
              for lbl in labels:
                  label_args += ["--label", lbl]

              cmd = [
                  "gh", "issue", "create",
                  "--title", full_title,
                  "--body", full_body,
              ] + label_args

              result = subprocess.run(cmd, capture_output=True, text=True)
              if result.returncode == 0:
                  print(f"Created: {full_title}")
                  print(result.stdout.strip())
              else:
                  # Label might not exist — retry without labels
                  cmd_nolabel = [
                      "gh", "issue", "create",
                      "--title", full_title,
                      "--body", full_body,
                  ]
                  result2 = subprocess.run(cmd_nolabel, capture_output=True, text=True)
                  if result2.returncode == 0:
                      print(f"Created (no label): {full_title}")
                  else:
                      print(f"Failed: {result2.stderr}", file=sys.stderr)

              time.sleep(1)
          PYEOF
