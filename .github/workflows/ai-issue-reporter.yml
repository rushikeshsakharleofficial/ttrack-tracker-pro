name: AI Issue Reporter

on:
  push:
    branches: [main]

permissions:
  issues: write
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get diff
        id: diff
        run: |
          DIFF=$(git diff HEAD~1 HEAD -- '*.rs' '*.toml' '*.sh' '*.yml' | head -c 12000)
          {
            echo 'diff<<EOF'
            echo "$DIFF"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "commit_msg<<MSGEOF" >> "$GITHUB_OUTPUT"
          echo "$COMMIT_MSG" >> "$GITHUB_OUTPUT"
          echo "MSGEOF" >> "$GITHUB_OUTPUT"

          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Analyze with NVIDIA AI
        id: ai
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          DIFF='${{ steps.diff.outputs.diff }}'
          COMMIT='${{ steps.diff.outputs.commit_msg }}'
          SHA='${{ steps.diff.outputs.sha }}'

          # Build prompt
          PROMPT="You are a senior Rust code reviewer. Analyze this git diff and commit message. Find real bugs, security issues, and correctness problems only. Skip style nits.

Commit: $COMMIT
SHA: $SHA

Diff:
$DIFF

Respond with a JSON array (no markdown, raw JSON only). Each element:
{
  \"title\": \"short issue title (under 70 chars)\",
  \"body\": \"detailed description with file:line if known, impact, and fix suggestion\",
  \"labels\": [\"bug\" or \"security\" or \"enhancement\"],
  \"severity\": \"critical\" | \"high\" | \"medium\"
}

Return [] if no real issues found. Only include issues severity medium or higher."

          PAYLOAD=$(jq -n \
            --arg model "nvidia/llama-3.1-nemotron-ultra-253b-v1" \
            --arg content "$PROMPT" \
            '{
              model: $model,
              messages: [{role: "user", content: $content}],
              temperature: 0.1,
              max_tokens: 2048,
              top_p: 0.7
            }')

          RESPONSE=$(curl -s -f \
            -H "Authorization: Bearer $NVIDIA_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://integrate.api.nvidia.com/v1/chat/completions")

          if [ $? -ne 0 ]; then
            echo "API call failed"
            echo "issues=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "[]"')

          # Extract JSON array from content (strip any surrounding markdown)
          ISSUES=$(echo "$CONTENT" | grep -o '\[.*\]' | head -1 || echo "[]")

          # Validate it's valid JSON array
          if ! echo "$ISSUES" | jq -e 'type == "array"' > /dev/null 2>&1; then
            ISSUES="[]"
          fi

          echo "issues<<EOF" >> "$GITHUB_OUTPUT"
          echo "$ISSUES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUES: ${{ steps.ai.outputs.issues }}
          SHA: ${{ steps.diff.outputs.sha }}
        run: |
          COUNT=$(echo "$ISSUES" | jq 'length')
          echo "Found $COUNT issue(s) to create"

          if [ "$COUNT" -eq 0 ]; then
            echo "No issues found — push looks clean."
            exit 0
          fi

          for i in $(seq 0 $((COUNT - 1))); do
            TITLE=$(echo "$ISSUES" | jq -r ".[$i].title")
            BODY=$(echo "$ISSUES" | jq -r ".[$i].body")
            SEVERITY=$(echo "$ISSUES" | jq -r ".[$i].severity")
            LABELS=$(echo "$ISSUES" | jq -r ".[$i].labels[]" | tr '\n' ',' | sed 's/,$//')

            FULL_BODY="**Found in commit:** $SHA

$BODY

---
*Auto-generated by AI Issue Reporter on push to main*"

            gh issue create \
              --title "[$SEVERITY] $TITLE" \
              --body "$FULL_BODY" \
              --label "$LABELS" \
              || echo "Failed to create issue $i, continuing"

            sleep 1
          done
