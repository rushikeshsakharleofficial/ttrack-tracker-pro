name: AI Issue Reporter

on:
  push:
    branches: [main]

permissions:
  issues: write
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Collect diff and metadata
        run: |
          git diff HEAD~1 HEAD -- '*.rs' '*.toml' '*.sh' '*.yml' \
            | head -c 12000 > /tmp/diff.txt
          git log -1 --pretty=%B > /tmp/commit.txt
          git rev-parse --short HEAD > /tmp/sha.txt
          echo "Diff size: $(wc -c < /tmp/diff.txt) bytes"

      - name: Analyze with Kimi K2.6 (NVIDIA NIM)
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: python3 .github/scripts/analyze.py

      - name: Create GitHub issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/create-issues.py
